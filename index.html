<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cars ranking</title> 
   <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 10px;
      counter-reset: item;
    }

    .card {
      position: relative;
      background: #222;
      padding: 12px;
      padding-right: 45px;
      border-radius: 10px;
      border: 1px solid #333;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.01);
      border-color: #555;
    }

   
    .card::before {
      content: "#" counter(item);
      counter-increment: item;
      position: absolute;
      right: 12px;
      top: 12px;
      font-weight: bold;
      font-size: 18px;
      color: #aaa;
    }

    
    .card:nth-child(1) {
      border: 2px solid gold;
    }

    .card:nth-child(2) {
      border: 2px solid silver;
    }

    .card:nth-child(3) {
      border: 2px solid #cd7f32;
    }

    /* Image */
    .card img {
      width: 45%;
      height: 250px;
      object-fit: contain;
      border-radius: 8px;
      margin-bottom: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .info {
      font-size: 14px;
      opacity: 0.8;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 15px 20px;
      background: #181818;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }

   .logo {
     height: 60px;
     width: auto;
     transition: 0.2s;
   }
     
   .logo:hover {
     transform: scale(1:1);
   }

  .logo-text {
    Text-family: "Segoe UI", Arial, sans-serif;
    font-size: 25px;
    font-weight: bold;
   }

  </style>
</head>
<body>

<div class="header">
  <img src="images/logo.png" class="logo" />
  <div class="logo-text">BOKA Cars</div>
</div>

<h2>Cars ranking</h2>

<button onclick="sortByPrice()">Sort by Price</button>
<button onclick="sortByHP()">Sort by power</button> 
<button onclick="resetData()">Reset</button>

<div id="list" class="container"></div>
<script src="data.js"></script>
<script src="script.js">
</script>
</body>
</html>
