<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cars ranking</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 15px 20px;
      background: #181818;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }

    .logo {
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
      height: 110px;
      width: auto;
      transition: 0.3s;
    }

    .logo:hover {
      transform: scale(1.1);
    }

    .logo-text {
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 25px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    h2 {
      margin: 18px 10px 10px;
      font-size: 24px;
    }

    .controls {
      display: flex;
      gap: 8px;
      padding: 0 10px 10px;
      flex-wrap: wrap;
    }

    button {
      background: #2a2a2a;
      color: white;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #333;
      border-color: #555;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 10px;
      counter-reset: item;
    }

    .card {
      position: relative;
      background: #222;
      padding: 12px;
      padding-right: 50px;
      border-radius: 10px;
      border: 1px solid #333;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.01);
      border-color: #555;
    }

    .card::before {
      content: "#" counter(item);
      counter-increment: item;
      position: absolute;
      right: 12px;
      top: 12px;
      font-weight: bold;
      font-size: 18px;
      color: #aaa;
    }

    .card:nth-child(1) {
      border: 2px solid gold;
    }

    .card:nth-child(2) {
      border: 2px solid silver;
    }

    .card:nth-child(3) {
      border: 2px solid #cd7f32;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 10px;
    }

    .car-image {
      width: 45%;
      height: 250px;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      flex-shrink: 0;
      background: #1a1a1a;
    }

    .title-box {
      display: flex;
      align-items: center;
      min-height: 250px;
      flex: 1;
      padding-right: 20px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.15;
      color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.35);
      letter-spacing: 0.3px;
    }

    .info-list {
      border-top: 1px solid #333;
      padding-top: 10px;
    }

    .info {
      font-size: 14px;
      color: #d2d2d2;
      margin-bottom: 5px;
      line-height: 1.4;
    }

    @media (max-width: 700px) {
      .card-top {
        flex-direction: column;
      }

      .car-image {
        width: 100%;
        height: 220px;
      }

      .title-box {
        min-height: auto;
        padding-right: 0;
      }

      .title {
        font-size: 22px;
       
        .score {
          color: #4CAF50 !important; 
          font-weight: bold;
}
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="images/logo_v1.2.png" class="logo" />
    <div class="logo-text">BOKA Cars</div>
    
  </div>

  <h2>Cars ranking</h2>

  <div class="controls">
    <button onclick="sortByPrice()">Sort by Price</button>
    <button onclick="sortByHP()">Sort by power</button>
    <button onclick="resetData()">Reset</button>
    <button onclick="sortByScore()">Sort By Score</button>
  </div>

  <div id="list" class="container"></div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
