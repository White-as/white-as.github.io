<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cars</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      padding: 10px;
    }

    .card {
      background: #222;
      padding: 10px;
      border-radius: 10px;
    }

    img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }
  </style>
</head>
<body>

<h2>Cars</h2>

<button onclick="sortByPrice()">Sort by Price</button>
<button onclick="sortByHP()">Sort by HP</button>
<button onclick="resetData()">Reset</button>

<div id="list" class="container"></div>
