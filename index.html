<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cars</title>  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
      counter-reset: item;
    }

    .card img {
     width: 40%;
     height: 250px;
     object-fit: cover;
     border-radius: 8px;
   }

    .card::before {
      content: counter(item) ".";
      position: absolute;
      left: 10px;
      top: 10px;
      font-weight: bold;
      color: #aaa;
    }

    img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h2>Cars</h2>
<button onclick="sortByPrice()">Sort by Price</button> <button onclick="sortByHP()">Sort by HP</button>
<button onclick="resetData()">Reset</button>

<div id="list" class="container"></div>
<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
