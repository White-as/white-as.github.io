<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cars Listing Project</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #111;
      color: #eee;
    }header {
  padding: 15px;
  background: #1c1c1c;
  display: flex;
  gap: 10px;
  align-items: center;
}

button {
  padding: 8px 12px;
  border: none;
  cursor: pointer;
  background: #333;
  color: white;
  border-radius: 6px;
}

button:hover {
  background: #555;
}

.container {
  padding: 15px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
}

.card {
  background: #1c1c1c;
  padding: 10px;
  border-radius: 10px;
}

.card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 8px;
  margin-bottom: 10px;
}

.title {
  font-size: 18px;
  margin-bottom: 8px;
}

.info {
  font-size: 14px;
  opacity: 0.8;
}

  </style>
</head>
<body><header>
  <button onclick="sortByPrice()">Sort by Price</button>
  <button onclick="sortByHP()">Sort by HP</button>
  <button onclick="resetData()">Reset</button>
</header><div class="container" id="list"></div><script>





let cars = [...originalCars];

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  cars.forEach(car => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <img src="${car.img}" alt="${car.name}" />
      <div class="title">${car.name}</div>
      <div class="info">Owner: ${car.owner}</div>
      <div class="info">Price: €${car.price}</div>
      <div class="info">HP: ${car.hp}</div>
    `;
    list.appendChild(div);
  });
}

function sortByPrice() {
  cars.sort((a, b) => a.price - b.price);
  render();
}

function sortByHP() {
  cars.sort((a, b) => b.hp - a.hp);
  render();
}

function resetData() {
  cars = [...originalCars];
  render();
}

render();
</script></body>
</html>
